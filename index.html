<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자기소개 - 포트폴리오</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- 네비게이션 바 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="#home">박인수</a>
            </div>
            <ul class="nav-menu">
                <li><a href="#about" class="nav-link">소개</a></li>
                <li><a href="#contact" class="nav-link">연락처</a></li>
            </ul>
        </div>
    </nav>

    <!-- 히어로 섹션 -->
    <section id="home" class="hero">
        <div class="hero-content">
            <h1 class="hero-title">안녕하세요, 박인수입니다!</h1>
            <p class="hero-subtitle">5년차 강사</p>
        </div>
    </section>

    <!-- 소개 섹션 -->
    <section id="about" class="about">
        <div class="container">
            <h2 class="section-title">소개</h2>
            <div class="about-content">
                <p>5년차 강사</p>
            </div>
        </div>
    </section>

    <!-- 취미 섹션 -->
    <section id="hobbies" class="hobbies">
        <div class="container">
            <h2 class="section-title">취미</h2>
            <div class="hobbies-grid">
                <div class="hobby-card">
                    <h3>개 만지기</h3>
                    <img src="dog.png" alt="개 이미지" class="hobby-image">
                </div>
                <div class="hobby-card">
                    <h3>게임하기</h3>
                    <img src="record.png" alt="게임 연역 이미지" class="hobby-image">
                    <p><a href="https://www.warcraftlogs.com/character/kr/%EC%95%84%EC%A6%88%EC%83%A4%EB%9D%BC/%eb%8b%88%eb%a9%b0%eb%8a%90%eb%a6%ac%ec%a5%90%eb%a9%b0%eb%8a%90%eb%a6%ac" target="_blank" rel="noopener noreferrer">게임 연역 보기</a></p>
                </div>
            </div>
        </div>
    </section>

    

    <!-- 연락처 섹션 -->
    <section id="contact" class="contact">
        <div class="container">
            <h2 class="section-title">연락처</h2>
            <div class="contact-content">
                <div class="contact-links">
                    <a href="mailto:isp829@haedal.io" class="contact-link">
                        <span class="contact-icon">✉</span>
                        <span>이메일: isp829@haedal.io</span>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- 푸터 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 박인수. All rights reserved.</p>
        </div>
    </footer>
</body>

</html>
